<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- terminal-minimal favicon: phosphor square (matches the breathing dot
       in the nav). adapts to OS light/dark. -->
  <rect x="36" y="36" width="56" height="56" rx="2" />
  <style>
    rect { fill: #2d7d33; }
    @media (prefers-color-scheme: dark) {
      rect { fill: #84e0a0; }
    }
  </style>
</svg>
